version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: casa_monarca_web
    ports:
      - "8080:80"
    environment:
      APP_ENV: development
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: casa_monarca
      DB_USER: casa_user
      DB_PASS: casa_pass
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: casa_monarca_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: casa_monarca
      MYSQL_USER: casa_user
      MYSQL_PASSWORD: casa_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  db_data:
