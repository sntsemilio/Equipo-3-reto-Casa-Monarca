<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificar Certificado — Casa Monarca</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { background: linear-gradient(135deg, #1B3A6B 0%, #0f2040 100%); min-height: 100vh; }
    .verify-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .verify-card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .verify-header { text-align: center; margin-bottom: 2rem; }
    .verify-header h2 { color: var(--primary); font-size: 1.4rem; margin-top: 0.5rem; }
    .verify-header p { color: #888; font-size: 0.85rem; }
    .input-group { display: flex; gap: 0.5rem; }
    .input-group .form-control { flex: 1; }
    .result-box { display: none; margin-top: 2rem; text-align: center; }
    .result-valid .seal-wrapper svg circle,
    .result-valid .seal-wrapper svg path { stroke: var(--success); }
    .result-icon { font-size: 4rem; margin-bottom: 1rem; }
    .result-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
    .result-valid .result-title { color: var(--success); }
    .result-revocado .result-title { color: var(--error); }
    .result-notfound .result-title { color: #888; }
    .result-desc { font-size: 0.9rem; color: #666; }
    .back-link { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: rgba(255,255,255,0.7); text-decoration: none; }
    .back-link:hover { color: white; }
    .folio-display {
      background: #f0eee9;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-family: monospace;
      font-size: 1rem;
      color: var(--primary);
      font-weight: 600;
      margin-top: 0.75rem;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="verify-page">
    <div class="verify-card">
      <div class="verify-header">
        <div style="font-size:2.5rem;">🔍</div>
        <h2>Verificar Autenticidad</h2>
        <p>Ingresa el folio del certificado para comprobar su validez</p>
      </div>

      <div class="form-group">
        <label for="folio-input">Número de folio</label>
        <div class="input-group">
          <input type="text" id="folio-input" class="form-control" placeholder="Ej. MNR-2024-00892" />
          <button class="btn btn-primary" id="btn-verificar">Verificar</button>
        </div>
      </div>

      <div id="result-box" class="result-box">
        <div id="result-icon" class="result-icon"></div>
        <div id="result-title" class="result-title"></div>
        <div id="result-desc" class="result-desc"></div>
        <div id="folio-display" class="folio-display"></div>
      </div>
    </div>

    <a href="index.html" class="back-link">← Volver al inicio de sesión</a>
  </div>

  <script type="module">
    import { consultarFolio } from './js/api.js';

    const btn = document.getElementById('btn-verificar');
    const input = document.getElementById('folio-input');
    const resultBox = document.getElementById('result-box');

    // Soporte para folio en URL (?folio=...)
    const params = new URLSearchParams(window.location.search);
    if (params.get('folio')) {
      input.value = params.get('folio');
      verificar(params.get('folio'));
    }

    btn.addEventListener('click', () => {
      const folio = input.value.trim();
      if (!folio) return;
      verificar(folio);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btn.click();
    });

    async function verificar(folio) {
      btn.disabled = true;
      btn.textContent = 'Consultando...';
      resultBox.style.display = 'none';

      const { data } = await consultarFolio(folio);
      const estatus = data.estatus || 'no_encontrado';

      const configs = {
        valido: {
          icon: '✅',
          title: 'Certificado Válido',
          desc: 'Este documento ha sido emitido y firmado digitalmente por Casa Monarca. Su autenticidad está verificada.',
          class: 'result-valid',
        },
        revocado: {
          icon: '🚫',
          title: 'Certificado Revocado',
          desc: 'Este documento fue revocado y ya no tiene validez oficial. Contacta a Casa Monarca para más información.',
          class: 'result-revocado',
        },
        no_encontrado: {
          icon: '❓',
          title: 'No encontrado',
          desc: 'No existe ningún documento con este folio en nuestro sistema. Verifica que el número sea correcto.',
          class: 'result-notfound',
        },
      };

      const cfg = configs[estatus] || configs['no_encontrado'];
      document.getElementById('result-icon').textContent = cfg.icon;
      document.getElementById('result-title').textContent = cfg.title;
      document.getElementById('result-desc').textContent = cfg.desc;
      document.getElementById('folio-display').textContent = `Folio: ${folio}`;
      resultBox.className = `result-box ${cfg.class}`;
      resultBox.style.display = 'block';

      btn.disabled = false;
      btn.textContent = 'Verificar';
    }
  </script>
</body>
</html>
