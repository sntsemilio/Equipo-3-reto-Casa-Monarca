<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa Monarca — Gestión de Certificados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1B3A6B 0%, #0f2040 100%);
      padding: 2rem;
    }
    .hero-card {
      background: white;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .hero-brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .hero-seal {
      width: 72px;
      height: 72px;
      border: 3px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
    }
    .hero-brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }
    .hero-brand p {
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.25rem;
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }
    .verify-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #888;
    }
    .verify-link a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .verify-link a:hover { text-decoration: underline; }
    #error-msg { display: none; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-card">
      <div class="hero-brand">
        <div class="hero-seal">CM</div>
        <h1>Casa Monarca</h1>
        <p>Sistema de Gestión de Certificados</p>
      </div>

      <div id="error-msg" class="alert alert-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="usuario@ejemplo.com" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding: 0.8rem;">
          Iniciar sesión
        </button>
      </form>

      <hr class="divider" />

      <p class="verify-link">
        ¿Tienes un certificado? <a href="verificar.html">Verificar autenticidad →</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { login } from './js/api.js';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Verificando...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { ok, data } = await login(email, password);

      if (ok && data.ok) {
        window.location.href = 'dashboard.html';
      } else {
        const errEl = document.getElementById('error-msg');
        errEl.style.display = 'block';
        errEl.textContent = data.mensaje || 'Credenciales incorrectas';
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
